<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin | Industrial Import NYM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  display:flex;
  height:100vh;
  background:#f5f7fb;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#111827;
  color:#fff;
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  background:none;
  border:none;
  color:#ccc;
  padding:10px;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1f2937;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP */
.top{
  background:#fff;
  padding:15px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
}

/* CONTENT */
.content{
  padding:20px;
  overflow:auto;
}

/* DASHBOARD */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  padding:20px;
  border-radius:10px;
  color:#fff;
}

.blue{background:#3b82f6;}
.green{background:#22c55e;}
.yellow{background:#facc15;color:#000;}
.red{background:#ef4444;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>

  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('productos')">Productos</button>
  <button onclick="show('marcas')">Marcas</button>
  <button onclick="show('categorias')">Categorías</button>
  <button onclick="logout()">Salir</button>
</div>

<div class="main">

  <div class="top">
    <strong id="title">Dashboard</strong>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="cards">
        <div class="card blue">Productos <br><span id="pCount">0</span></div>
        <div class="card green">Marcas <br><span id="mCount">0</span></div>
        <div class="card yellow">Categorías <br><span id="cCount">0</span></div>
        <div class="card red">Subcategorías <br><span id="sCount">0</span></div>
      </div>
    </div>

    <!-- PRODUCTOS -->
    <div id="productos" style="display:none">
      <h2>Productos</h2>
      <div id="listProductos"></div>
    </div>

  </div>

</div>
<!-- SUPABASE CONFIG (EL TUYO, NO CAMBIAR) -->
<script src="js/supabase-config.js"></script>

<script>

const supabase = window.nymSupabase;

/* =============================
   VARIABLES
============================= */
let productos = [];
let marcas = [];
let categorias = [];
let subcategorias = [];

/* =============================
   NAVEGACIÓN (ARREGLADO)
============================= */

function show(id){

  document.querySelectorAll(".content > div").forEach(sec=>{
    sec.style.display="none";
  });

  document.getElementById(id).style.display="block";
  document.getElementById("title").innerText = id.toUpperCase();
}

/* =============================
   LOGOUT (ARREGLADO)
============================= */

async function logout(){
  await supabase.auth.signOut();
  window.location.href = "admin-login.html";
}

/* =============================
   AUTH CHECK
============================= */

async function checkAuth(){
  const { data } = await supabase.auth.getSession();

  if(!data.session){
    window.location.href = "admin-login.html";
  }
}

/* =============================
   LOAD DATA
============================= */

async function loadAll(){

  const { data: p } = await supabase.from("products").select("*");
  const { data: m } = await supabase.from("brands").select("*");
  const { data: c } = await supabase.from("categories").select("*");
  const { data: s } = await supabase.from("subcategories").select("*");

  productos = p || [];
  marcas = m || [];
  categorias = c || [];
  subcategorias = s || [];

  renderAll();
}

/* =============================
   RENDER GENERAL
============================= */

function renderAll(){

  // DASHBOARD
  document.getElementById("pCount").innerText = productos.length;
  document.getElementById("mCount").innerText = marcas.length;
  document.getElementById("cCount").innerText = categorias.length;
  document.getElementById("sCount").innerText = subcategorias.length;

  // PRODUCTOS
  const cont = document.getElementById("listProductos");

  cont.innerHTML = productos.map(p => `
    <div style="
      background:#fff;
      padding:10px;
      margin:5px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
    ">

      <div>
        <strong>${p.name}</strong>
      </div>

      <div>
        <button onclick="eliminarProducto('${p.id}')">🗑️</button>
      </div>

    </div>
  `).join("");
}

/* =============================
   ELIMINAR PRODUCTO
============================= */

async function eliminarProducto(id){

  if(!confirm("¿Eliminar producto?")) return;

  await supabase.from("products").delete().eq("id", id);

  loadAll();
}

/* =============================
   INIT
============================= */

async function init(){

  await checkAuth();
  await loadAll();

}

init();

</script>
