<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Admin Panel | Industrial Import NYM</title>

  <link rel="icon" href="imagenes/banners/banner-1.png"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Inter", sans-serif;
    }

    body{
      background:#f4f6fb;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:#1f2937;
      color:#fff;
      display:flex;
      flex-direction:column;
      padding:20px;
    }

    .sidebar h2{
      font-size:18px;
      margin-bottom:20px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu button{
      background:none;
      border:none;
      color:#cbd5e1;
      padding:10px;
      text-align:left;
      border-radius:8px;
      cursor:pointer;
      transition:.2s;
      font-weight:600;
    }

    .menu button:hover{
      background:#374151;
      color:#fff;
    }

    .menu button.active{
      background:#3b82f6;
      color:#fff;
    }

    .submenu{
      margin-left:15px;
      display:none;
      flex-direction:column;
    }

    .submenu button{
      font-size:14px;
    }

    /* MAIN */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    /* TOPBAR */
    .topbar{
      background:#fff;
      padding:15px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #e5e7eb;
    }

    .topbar h1{
      font-size:18px;
    }

    /* DASHBOARD */
    .content{
      padding:20px;
      overflow:auto;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    .card{
      padding:20px;
      border-radius:10px;
      color:#fff;
      font-weight:700;
    }

    .blue{background:#3b82f6;}
    .green{background:#22c55e;}
    .yellow{background:#facc15; color:#000;}
    .red{background:#ef4444;}

    .card span{
      display:block;
      font-size:26px;
      margin-top:5px;
    }

    /* SECTIONS */
    .section{
      display:none;
    }

    .section.active{
      display:block;
    }

  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>Panel Admin</h2>

  <div class="menu">

    <button class="active" onclick="showSection('dashboard')">
      <i class="fa-solid fa-chart-line"></i> Dashboard
    </button>

    <button onclick="toggleMenu('productosMenu')">
      <i class="fa-solid fa-box"></i> Productos
    </button>

    <div class="submenu" id="productosMenu">
      <button onclick="showSection('productos')">Lista de Productos</button>
      <button onclick="showSection('crearProducto')">Crear Producto</button>
      <button onclick="showSection('categorias')">Categorías</button>
      <button onclick="showSection('subcategorias')">Subcategorías</button>
    </div>

    <button onclick="showSection('marcas')">
      <i class="fa-solid fa-tags"></i> Marcas
    </button>

    <button onclick="showSection('empresa')">
      <i class="fa-solid fa-building"></i> Empresa
    </button>

    <button onclick="showSection('reportes')">
      <i class="fa-solid fa-chart-pie"></i> Reportes
    </button>

    <button onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Salir
    </button>

  </div>

</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h1 id="title">Dashboard</h1>
    <span id="user">Admin</span>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">

      <div class="cards">

        <div class="card blue">
          Productos
          <span id="totalProductos">0</span>
        </div>

        <div class="card green">
          Marcas
          <span id="totalMarcas">0</span>
        </div>

        <div class="card yellow">
          Categorías
          <span id="totalCategorias">0</span>
        </div>

        <div class="card red">
          Subcategorías
          <span id="totalSubcategorias">0</span>
        </div>

      </div>

    </div>

    <!-- PRODUCTOS -->
    <div id="productos" class="section">
      <h2>Lista de productos</h2>
      <div id="listaProductos"></div>
    </div>

    <!-- CREAR PRODUCTO -->
    <div id="crearProducto" class="section">
      <h2>Crear producto</h2>

      <input id="nombreProducto" placeholder="Nombre"><br><br>
      <select id="marcaProducto"></select><br><br>
      <select id="categoriaProducto"></select><br><br>
      <select id="subcategoriaProducto"></select><br><br>

      <button onclick="guardarProducto()">Guardar</button>
    </div>

    <!-- CATEGORIAS -->
    <div id="categorias" class="section">
      <h2>Categorías</h2>
      <div id="listaCategorias"></div>
    </div>

    <!-- SUBCATEGORIAS -->
    <div id="subcategorias" class="section">
      <h2>Subcategorías</h2>
      <div id="listaSubcategorias"></div>
    </div>

    <!-- MARCAS -->
    <div id="marcas" class="section">
      <h2>Marcas</h2>
      <div id="listaMarcas"></div>
    </div>

    <!-- EMPRESA -->
    <div id="empresa" class="section">
      <h2>Datos de empresa</h2>
    </div>

    <!-- REPORTES -->
    <div id="reportes" class="section">
      <h2>Reportes</h2>
    </div>

  </div>

</div>
<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "TU_URL_SUPABASE";
const SUPABASE_KEY = "TU_ANON_KEY";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// DATA
let productos = [];
let marcas = [];
let categorias = [];
let subcategorias = [];

/* =============================
   NAVEGACIÓN
============================= */

function showSection(id){
  document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.getElementById("title").innerText = id.toUpperCase();
}

function toggleMenu(id){
  const menu = document.getElementById(id);
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* =============================
   AUTH
============================= */

async function checkAuth(){
  const { data } = await supabase.auth.getSession();

  if(!data.session){
    window.location.href = "admin-login.html";
  }
}

async function logout(){
  await supabase.auth.signOut();
  window.location.href = "admin-login.html";
}

/* =============================
   LOAD DATA
============================= */

async function loadProductos(){
  const { data } = await supabase.from("products").select("*");
  productos = data || [];
  renderProductos();
}

async function loadMarcas(){
  const { data } = await supabase.from("brands").select("*");
  marcas = data || [];
  renderMarcas();
}

async function loadCategorias(){
  const { data } = await supabase.from("categories").select("*");
  categorias = data || [];
  renderCategorias();
}

async function loadSubcategorias(){
  const { data } = await supabase.from("subcategories").select("*");
  subcategorias = data || [];
  renderSubcategorias();
}

/* =============================
   RENDER DASHBOARD
============================= */

function renderDashboard(){
  document.getElementById("totalProductos").innerText = productos.length;
  document.getElementById("totalMarcas").innerText = marcas.length;
  document.getElementById("totalCategorias").innerText = categorias.length;
  document.getElementById("totalSubcategorias").innerText = subcategorias.length;
}

/* =============================
   RENDER PRODUCTOS
============================= */

function renderProductos(){
  const cont = document.getElementById("listaProductos");

  cont.innerHTML = productos.map(p => `
    <div style="padding:10px;border:1px solid #ccc;margin:5px;border-radius:6px;">
      ${p.name}
      <button onclick="eliminarProducto('${p.id}')">Eliminar</button>
    </div>
  `).join("");

  renderDashboard();
}

/* =============================
   RENDER MARCAS
============================= */

function renderMarcas(){
  const cont = document.getElementById("listaMarcas");

  cont.innerHTML = marcas.map(m => `
    <div>${m.name}</div>
  `).join("");

  llenarSelectMarcas();
  renderDashboard();
}

/* =============================
   RENDER CATEGORIAS
============================= */

function renderCategorias(){
  const cont = document.getElementById("listaCategorias");

  cont.innerHTML = categorias.map(c => `
    <div>${c.name}</div>
  `).join("");

  llenarSelectCategorias();
  renderDashboard();
}

/* =============================
   RENDER SUBCATEGORIAS
============================= */

function renderSubcategorias(){
  const cont = document.getElementById("listaSubcategorias");

  cont.innerHTML = subcategorias.map(s => `
    <div>${s.name}</div>
  `).join("");

  llenarSelectSubcategorias();
  renderDashboard();
}

/* =============================
   SELECTS DINÁMICOS
============================= */

function llenarSelectMarcas(){
  const select = document.getElementById("marcaProducto");

  select.innerHTML = marcas.map(m =>
    `<option value="${m.id}">${m.name}</option>`
  ).join("");
}

function llenarSelectCategorias(){
  const select = document.getElementById("categoriaProducto");

  select.innerHTML = categorias.map(c =>
    `<option value="${c.id}">${c.name}</option>`
  ).join("");
}

function llenarSelectSubcategorias(){
  const select = document.getElementById("subcategoriaProducto");

  select.innerHTML = subcategorias.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join("");
}

/* =============================
   GUARDAR PRODUCTO
============================= */

async function guardarProducto(){

  const nombre = document.getElementById("nombreProducto").value;
  const marca = document.getElementById("marcaProducto").value;
  const categoria = document.getElementById("categoriaProducto").value;
  const subcategoria = document.getElementById("subcategoriaProducto").value;

  if(!nombre){
    alert("Nombre requerido");
    return;
  }

  await supabase.from("products").insert([{
    name: nombre,
    brand_id: marca,
    category_id: categoria,
    subcategory_id: subcategoria
  }]);

  alert("Producto guardado");

  loadProductos();
}

/* =============================
   ELIMINAR PRODUCTO
============================= */

async function eliminarProducto(id){

  if(!confirm("¿Eliminar producto?")) return;

  await supabase.from("products").delete().eq("id", id);

  loadProductos();
}

/* =============================
   INIT
============================= */

async function init(){

  await checkAuth();

  await loadMarcas();
  await loadCategorias();
  await loadSubcategorias();
  await loadProductos();

}

init();

</script>
<script>

/* =============================
   EDITAR PRODUCTO
============================= */

let editandoId = null;

function editarProducto(id){

  const p = productos.find(x => x.id === id);

  document.getElementById("nombreProducto").value = p.name;
  document.getElementById("marcaProducto").value = p.brand_id;
  document.getElementById("categoriaProducto").value = p.category_id;
  document.getElementById("subcategoriaProducto").value = p.subcategory_id;

  editandoId = id;

  showSection("crearProducto");
}

/* =============================
   GUARDAR (CREATE / UPDATE)
============================= */

async function guardarProducto(){

  const nombre = document.getElementById("nombreProducto").value;
  const marca = document.getElementById("marcaProducto").value;
  const categoria = document.getElementById("categoriaProducto").value;
  const subcategoria = document.getElementById("subcategoriaProducto").value;

  if(!nombre){
    alert("Nombre requerido");
    return;
  }

  if(editandoId){

    await supabase.from("products")
      .update({
        name: nombre,
        brand_id: marca,
        category_id: categoria,
        subcategory_id: subcategoria
      })
      .eq("id", editandoId);

    alert("Producto actualizado");
    editandoId = null;

  }else{

    await supabase.from("products").insert([{
      name: nombre,
      brand_id: marca,
      category_id: categoria,
      subcategory_id: subcategoria
    }]);

    alert("Producto creado");
  }

  limpiarFormulario();
  loadProductos();
}

/* =============================
   LIMPIAR FORM
============================= */

function limpiarFormulario(){
  document.getElementById("nombreProducto").value = "";
  editandoId = null;
}

/* =============================
   RENDER PRODUCTOS PRO
============================= */

function renderProductos(){

  const cont = document.getElementById("listaProductos");

  cont.innerHTML = productos.map(p => `

    <div style="
      padding:12px;
      border:1px solid #ddd;
      margin:6px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    ">

      <div>
        <strong>${p.name}</strong><br>
        <small>ID: ${p.id}</small>
      </div>

      <div>
        <button onclick="editarProducto('${p.id}')">✏️</button>
        <button onclick="eliminarProducto('${p.id}')">🗑️</button>
      </div>

    </div>

  `).join("");

  renderDashboard();
}

/* =============================
   ELIMINAR MARCA
============================= */

async function eliminarMarca(id){

  const usado = productos.some(p => p.brand_id === id);

  if(usado){
    alert("No puedes eliminar esta marca, tiene productos.");
    return;
  }

  if(!confirm("Eliminar marca?")) return;

  await supabase.from("brands").delete().eq("id", id);

  loadMarcas();
}

/* =============================
   ELIMINAR CATEGORIA
============================= */

async function eliminarCategoria(id){

  const usado = productos.some(p => p.category_id === id);

  if(usado){
    alert("Tiene productos asociados.");
    return;
  }

  if(!confirm("Eliminar categoría?")) return;

  await supabase.from("categories").delete().eq("id", id);

  loadCategorias();
}

/* =============================
   ELIMINAR SUBCATEGORIA
============================= */

async function eliminarSubcategoria(id){

  const usado = productos.some(p => p.subcategory_id === id);

  if(usado){
    alert("Tiene productos asociados.");
    return;
  }

  if(!confirm("Eliminar subcategoría?")) return;

  await supabase.from("subcategories").delete().eq("id", id);

  loadSubcategorias();
}

/* =============================
   RENDER MARCAS PRO
============================= */

function renderMarcas(){

  const cont = document.getElementById("listaMarcas");

  cont.innerHTML = marcas.map(m => `
    <div>
      ${m.name}
      <button onclick="eliminarMarca('${m.id}')">🗑️</button>
    </div>
  `).join("");

  llenarSelectMarcas();
  renderDashboard();
}

/* =============================
   RENDER CATEGORIAS PRO
============================= */

function renderCategorias(){

  const cont = document.getElementById("listaCategorias");

  cont.innerHTML = categorias.map(c => `
    <div>
      ${c.name}
      <button onclick="eliminarCategoria('${c.id}')">🗑️</button>
    </div>
  `).join("");

  llenarSelectCategorias();
  renderDashboard();
}

/* =============================
   RENDER SUBCATEGORIAS PRO
============================= */

function renderSubcategorias(){

  const cont = document.getElementById("listaSubcategorias");

  cont.innerHTML = subcategorias.map(s => `
    <div>
      ${s.name}
      <button onclick="eliminarSubcategoria('${s.id}')">🗑️</button>
    </div>
  `).join("");

  llenarSelectSubcategorias();
  renderDashboard();
}

</script>
